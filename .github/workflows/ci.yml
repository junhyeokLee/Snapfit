name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend-tests:
    name: Flutter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build store templates from handoff
        run: dart run tool/build_store_templates_from_handoff.dart --input=assets/templates/figma_handoff_example.json --output=assets/templates/generated/store_latest.json --pages=12
      - name: Run template release gate
        run: dart run tool/template_release_gate.dart --store-json=assets/templates/generated/store_latest.json
      - name: Analyze
        run: dart analyze
      - name: Run tests
        run: flutter test
