name: Template Release

on:
  workflow_dispatch:
    inputs:
      handoff_path:
        description: 'Figma handoff JSON path'
        required: true
        default: 'assets/templates/figma_handoff_example.json'
      pages:
        description: 'Page count (12~24)'
        required: true
        default: '12'
      publish:
        description: 'Publish to backend'
        required: true
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Pub get
        run: flutter pub get

      - name: Dry run pipeline
        run: |
          ./scripts/run_figma_template_pipeline.sh \
            --handoff="${{ github.event.inputs.handoff_path }}" \
            --pages="${{ github.event.inputs.pages }}" \
            --publish=false \
            --notify=false

      - name: Publish pipeline
        if: ${{ github.event.inputs.publish == 'true' }}
        env:
          SNAPFIT_API_BASE_URL: ${{ secrets.SNAPFIT_API_BASE_URL }}
          SNAPFIT_PUSH_ADMIN_KEY: ${{ secrets.SNAPFIT_PUSH_ADMIN_KEY }}
        run: |
          ./scripts/run_figma_template_pipeline.sh \
            --handoff="${{ github.event.inputs.handoff_path }}" \
            --pages="${{ github.event.inputs.pages }}" \
            --base-url="${SNAPFIT_API_BASE_URL}" \
            --publish=true \
            --auto-fetch-key=false \
            --notify=false
